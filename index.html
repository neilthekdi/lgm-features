<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LGM Features</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --stone: #F5F0E8;
      --charcoal: #1A1814;
      --gold: #B8975A;
      --stone-mid: #E8E0D0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--stone);
      color: var(--charcoal);
      font-family: 'Cormorant Garamond', serif;
    }

    section {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(2rem, 6vw, 6rem) clamp(1.5rem, 8vw, 8rem);
    }

    #hero    { min-height: 100vh; }
    #about   { min-height: 90vh; }
    #slate   { min-height: 90vh; }
    #contact { min-height: 80vh; }

    /* Hero */
    .hero-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1rem, 3vw, 2rem);
    }

    .wordmark {
      width: clamp(240px, 60vw, 680px);
      height: auto;
      display: block;
    }

    .wordmark path {
      fill: none;
      stroke: var(--charcoal);
      stroke-width: 0.6;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--charcoal);
    }

    /* About */
    .about-inner {
      max-width: 52ch;
      text-align: center;
    }

    .about-inner p {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.15rem, 2.4vw, 1.5rem);
      font-weight: 300;
      line-height: 1.75;
      color: var(--charcoal);
    }

    /* Slate */
    .slate-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.75rem, 2vw, 1.5rem);
    }

    .numeral {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 18vw, 14rem);
      font-weight: 300;
      line-height: 1;
      color: var(--charcoal);
    }

    .slate-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--charcoal);
    }

    /* Contact */
    .contact-email {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.9rem, 2.2vw, 1.2rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--charcoal);
      text-decoration: none;
    }
  </style>
</head>
<body>

      </svg>
      <p class="tagline">New York.&nbsp; Feature Films.</p>
    </div>
  </section>

  <section id="about">
    <div class="about-inner">
      <p>LGM Features is a New York-based production company developing an eight-picture slate of original feature films. Founded on a belief in durable storytelling and long-form conviction.</p>
    </div>
  </section>

  <section id="slate">
    <div class="slate-inner">
      <span class="numeral">VIII</span>
      <p class="slate-sub">Eight features in development.</p>
    </div>
  </section>

  <section id="contact">
    <a class="contact-email" href="mailto:lgm@lgmfeatures.com">lgm@lgmfeatures.com</a>
  </section>
  <script>
    (function () {
      const ns = 'http://www.w3.org/2000/svg';

      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('xmlns', ns);
      svg.setAttribute('width', '100vw');
      svg.setAttribute('height', '100vh');
      svg.style.cssText = [
        'position:fixed',
        'top:0',
        'left:0',
        'width:100vw',
        'height:100vh',
        'pointer-events:none',
        'z-index:999',
        'mix-blend-mode:soft-light',
        'opacity:0.05',
      ].join(';');

      const defs = document.createElementNS(ns, 'defs');

      const filter = document.createElementNS(ns, 'filter');
      filter.setAttribute('id', 'grain');
      filter.setAttribute('x', '0%');
      filter.setAttribute('y', '0%');
      filter.setAttribute('width', '100%');
      filter.setAttribute('height', '100%');
      filter.setAttribute('color-interpolation-filters', 'sRGB');

      const turbulence = document.createElementNS(ns, 'feTurbulence');
      turbulence.setAttribute('type', 'fractalNoise');
      turbulence.setAttribute('baseFrequency', '0.65');
      turbulence.setAttribute('numOctaves', '3');
      turbulence.setAttribute('seed', '0');
      turbulence.setAttribute('stitchTiles', 'stitch');
      turbulence.setAttribute('result', 'noise');

      const colorMatrix = document.createElementNS(ns, 'feColorMatrix');
      colorMatrix.setAttribute('type', 'saturate');
      colorMatrix.setAttribute('values', '0');

      filter.appendChild(turbulence);
      filter.appendChild(colorMatrix);
      defs.appendChild(filter);

      const rect = document.createElementNS(ns, 'rect');
      rect.setAttribute('width', '100%');
      rect.setAttribute('height', '100%');
      rect.setAttribute('filter', 'url(#grain)');

      svg.appendChild(defs);
      svg.appendChild(rect);
      document.body.appendChild(svg);

      let seed = 0;
      setInterval(function () {
        seed = (seed + 1) % 1000;
        turbulence.setAttribute('seed', seed);
      }, 100);
    })();

    (function () {
      // SVG <text> elements don't implement getTotalLength(), so we measure
      // after fonts load and fall back to a safe upper bound if unavailable.
      const SCROLL_RANGE = 300; // px over which the draw completes
      const CHARCOAL = '#1A1814';

      function initStroke() {
        const text = document.querySelector('.wordmark path');
        if (!text) return;

        const length = typeof text.getTotalLength === 'function'
          ? text.getTotalLength()
          : 3000;

        text.style.stroke        = CHARCOAL;
        text.style.strokeWidth   = '1';
        text.style.fill          = 'transparent';
        text.style.transition    = 'fill 0.5s ease';
        text.style.strokeDasharray  = length;
        text.style.strokeDashoffset = length;

        function draw() {
          const progress = Math.min(window.scrollY / SCROLL_RANGE, 1);
          text.style.strokeDashoffset = length * (1 - progress);
          text.style.fill = progress >= 1 ? CHARCOAL : 'transparent';
        }

        window.addEventListener('scroll', draw, { passive: true });
        draw();
      }

      // Wait for fonts so getTotalLength() (where supported) reflects
      // actual glyph geometry rather than a fallback metric.
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(initStroke);
      } else {
        window.addEventListener('load', initStroke);
      }
    })();
  </script>

</html>
